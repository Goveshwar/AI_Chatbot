<form
    id="chat-form"
    class="chat-input-form"
    data-conversation-id="{{ active_conversation.id if active_conversation else '' }}"
>

    <div class="chat-composer">

        <!-- File Preview -->

        <div
            id="file-preview"
            class="file-preview"
        ></div>

        <!-- Input Area -->

        <div class="chat-input-container">

            <!-- Upload -->

            <input
                type="file"
                id="file-upload"
                hidden
                accept=".pdf,.doc,.docx,.txt"
            >

            <button
                type="button"
                id="upload-button"
                class="icon-btn upload-btn"
                title="Attach file"
                aria-label="Attach file"
                onclick="document.getElementById('file-upload').click()"
            >

                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >

                    <path d="M21.44 11.05L12.25 20.24a6 6 0 0 1-8.49-8.49l9.2-9.19a4 4 0 1 1 5.65 5.66l-9.2 9.19a2 2 0 0 1-2.82-2.83l8.49-8.48"/>

                </svg>

            </button>

            <!-- Textarea -->

            <textarea
                id="message-input"
                name="message"
                rows="1"
                autocomplete="off"
                spellcheck="true"
                placeholder="Message AI Assistant"
                required
            ></textarea>

            <!-- Send -->

            <button
                type="submit"
                id="send-button"
                class="icon-btn send-btn"
                aria-label="Send"
                title="Send"
            >

                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >

                    <line
                        x1="22"
                        y1="2"
                        x2="11"
                        y2="13"
                    />

                    <polygon
                        points="22 2 15 22 11 13 2 9 22 2"
                    />

                </svg>

            </button>

        </div>

    </div>

</form>

<div
    id="upload-status"
    class="upload-status"
></div>

<footer class="chat-footer">

    <span>

        AI Assistant can make mistakes. Please verify important information.

    </span>

</footer>
