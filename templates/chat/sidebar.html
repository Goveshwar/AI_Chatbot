<div class="sidebar">

    <!-- =========================
         Sidebar Header
    ========================== -->

    <div class="sidebar-header">

        <a
            href="{{ url_for('chat.new_chat') }}"
            class="new-chat-btn"
        >

            <span class="sidebar-icon">

                ＋

            </span>

            <span>

                New Chat

            </span>

        </a>

        <div class="search-container">

            <input
                type="text"
                id="conversation-search"
                class="chat-search"
                placeholder="Search chats..."
                autocomplete="off"
            >

        </div>

    </div>

    <!-- =========================
         Conversation List
    ========================== -->

    <div
        id="conversation-list"
        class="conversation-list"
    >

        {% if conversations %}

            {% for conversation in conversations %}

                <div
                    class="conversation-item {% if active_conversation and active_conversation.id == conversation.id %}active{% endif %}"
                >

                    <!-- Conversation -->

                    <a
                        href="{{ url_for(
                            'chat.conversation',
                            conversation_id=conversation.id
                        ) }}"
                        class="conversation-link"
                    >

                        <span
                            class="conversation-title"
                        >

                            {{ conversation.title }}

                        </span>

                    </a>

                    <!-- Three Dot Menu -->

                    <div
                        class="conversation-actions"
                    >

                        <button
                            type="button"
                            class="conversation-menu-btn"
                            onclick="toggleConversationMenu(event, {{ conversation.id }})"
                        >

                            ⋯

                        </button>

                        <div
                            id="conversation-menu-{{ conversation.id }}"
                            class="conversation-menu"
                        >

                            <!-- Rename (Future) -->

                            <button
                                type="button"
                                class="conversation-option"
                            >

                                ✏️ Rename

                            </button>

                            <!-- Delete -->

                            <form
                                action="{{ url_for(
                                    'chat.delete_conversation',
                                    conversation_id=conversation.id
                                ) }}"
                                method="POST"
                                onsubmit="return confirm('Delete this conversation?')"
                            >

                                <button
                                    type="submit"
                                    class="conversation-option delete-chat-btn"
                                >

                                    🗑 Delete

                                </button>

                            </form>

                        </div>

                    </div>

                </div>

            {% endfor %}

        {% else %}

            <div
                class="empty-conversations"
            >

                <p>

                    No conversations yet

                </p>

                <small>

                    Start a new chat to begin.

                </small>

            </div>

        {% endif %}

    </div>

    <!-- =========================
         Sidebar Footer
    ========================== -->

    <div class="sidebar-footer">

        <div
            class="user-profile"
            onclick="toggleProfileMenu()"
        >

            <div
                class="user-avatar"
            >

                {{ current_user.name[0].upper() }}

            </div>

            <div
                class="user-info"
            >

                <div
                    class="user-name"
                >

                    {{ current_user.name }}

                </div>

                <div
                    class="user-email"
                >

                    {{ current_user.email }}

                </div>

            </div>

            <button
                type="button"
                class="profile-menu-btn"
            >

                ⋮

            </button>

        </div>

        <div
            id="profile-menu"
            class="profile-menu"
        >

            <a
                href="{{ url_for('profile.profile') }}"
            >

                👤 My Profile

            </a>

            <a
                href="#"
            >

                ⚙️ Settings

            </a>

            <form
                action="{{ url_for('auth.logout') }}"
                method="POST"
            >

                <button
                    type="submit"
                    class="logout-btn"
                >

                    🚪 Log out

                </button>

            </form>

        </div>

    </div>

</div>
